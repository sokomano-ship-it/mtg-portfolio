name: Sync Collection from Excel

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Sync collection and build portfolio
        run: npm run sync:collection

      - name: Commit updated portfolio data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add database/portfolio.db
          git add frontend/data

          git diff --cached --quiet || git commit -m "Sync collection from Excel"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy Pages
        uses: actions/deploy-pages@v4