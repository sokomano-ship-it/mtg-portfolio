name: Daily Portfolio Update and Pages Deploy

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build portfolio
        run: npm run build:pages

      - name: Send alerts
        if: github.event_name == 'schedule'
        run: npm run send:alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add database/portfolio.db
          git add frontend/data/portfolio.json
          git add frontend/data/price-history-snapshots.json
          git add frontend/data/price-history-analysis.json
          git add frontend/data/alerts-history.json

          git diff --cached --quiet || git commit -m "Daily portfolio update"

      - name: Push
        run: git push || echo "Nothing to push"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy Pages
        uses: actions/deploy-pages@v4