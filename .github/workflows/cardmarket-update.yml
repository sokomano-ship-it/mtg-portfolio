name: Manual Cardmarket Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update Cardmarket prices
        run: |
          node backend/updateCardmarketFromPriceGuide.js
          node backend/updatePortfolioValue.js

      - name: Commit database
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add database/portfolio.db

          git diff --cached --quiet || git commit -m "Manual Cardmarket update"

      - name: Push
        run: git push || echo "Nothing to push"