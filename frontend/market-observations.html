<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Observations Marché - MTG Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; }
    .wrap { max-width: 1300px; margin: auto; }
    .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 18px; margin-bottom: 20px; }
    input { padding: 8px; width: 300px; max-width: 100%; }
    button { padding: 10px 14px; cursor: pointer; margin-right: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    .muted { color: #777; }
    .badge { padding: 3px 7px; border-radius: 8px; background: #eee; }
    .log { background: #111; color: #0f0; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>📊 Observations Marché</h1>
  <p class="muted">Visualisation des observations saisies pour le futur modèle d’estimation selon l’état.</p>

  <div class="card">
    <h2>Connexion API</h2>
    <input id="apiUrl" placeholder="https://...vercel.app/api/market-data">
    <input id="password" type="password" placeholder="Mot de passe admin">
    <button onclick="saveSettings()">Sauvegarder paramètres</button>
    <button onclick="loadData()">Charger observations</button>
  </div>

  <div class="card">
    <h2>Résumé</h2>
    <p id="summary">Aucune donnée chargée.</p>
  </div>

  <div class="card">
    <h2>Historique</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Carte</th>
          <th>Édition</th>
          <th>Langue</th>
          <th>État</th>
          <th>Prix mini</th>
          <th>Trend</th>
          <th>Avg30</th>
          <th>Avg7</th>
          <th>Avg1</th>
          <th>Observable</th>
          <th>Source</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="obsBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Log</h2>
    <pre id="log" class="log">Prêt.</pre>
  </div>
</div>

<script>
let observations = [];
let trackedCards = [];

function $(id) { return document.getElementById(id); }
function log(msg) { $("log").textContent = msg; }

function normalizeKey(item) {
  return [
    String(item.nomCarte || "").trim().toLowerCase(),
    String(item.edition || "").trim().toLowerCase(),
    String(item.langue || "").trim().toLowerCase()
  ].join("|");
}

function isObservable(obs) {
  const key = normalizeKey(obs);
  const tracked = trackedCards.find(card => normalizeKey(card) === key);
  return tracked ? tracked.observable === true : false;
}

function saveSettings() {
  localStorage.setItem("mtgApiUrl", $("apiUrl").value.trim());
  localStorage.setItem("mtgAdminPassword", $("password").value);
  log("Paramètres sauvegardés.");
}

function loadSettings() {
  $("apiUrl").value = localStorage.getItem("mtgApiUrl") || "";
  $("password").value = localStorage.getItem("mtgAdminPassword") || "";
}

async function api(method, body) {
  const response = await fetch($("apiUrl").value.trim(), {
    method,
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": $("password").value
    },
    body: body ? JSON.stringify(body) : undefined
  });

  const data = await response.json();
  if (!response.ok || !data.ok) throw new Error(data.error || "Erreur API");
  return data;
}

async function loadData() {
  try {
    const data = await api("GET");
    observations = data.observations || [];
    trackedCards = data.trackedCards || [];
    render();
    log("Observations chargées.");
  } catch (e) {
    log("Erreur : " + e.message);
  }
}

function render() {
  const total = observations.length;
  const cards = new Set(observations.map(o => normalizeKey(o))).size;
  const observableCount = observations.filter(isObservable).length;
  const trackedCount = trackedCards.filter(c => c.observable).length;

  $("summary").innerHTML = `
    <strong>${total}</strong> observation(s) —
    <strong>${cards}</strong> carte(s) distincte(s) —
    <strong>${observableCount}</strong> observation(s) observable(s) —
    <strong>${trackedCount}</strong> carte(s) suivie(s)
  `;

  const sorted = [...observations].sort((a, b) =>
    String(b.observationDate || b.date || "").localeCompare(String(a.observationDate || a.date || ""))
  );

  const tbody = $("obsBody");
  tbody.innerHTML = "";

  sorted.forEach(obs => {
    tbody.innerHTML += `
      <tr>
        <td>${obs.observationDate || obs.date || "-"}</td>
        <td><strong>${obs.nomCarte || "-"}</strong></td>
        <td>${obs.edition || "-"}</td>
        <td>${obs.langue || "-"}</td>
        <td><span class="badge">${obs.condition || "-"}</span></td>
        <td>${Number(obs.observedMinPrice || 0).toFixed(2)} €</td>
        <td>${Number(obs.marketSnapshot?.trendPrice || 0).toFixed(2)} €</td>
        <td>${Number(obs.marketSnapshot?.avg30 || 0).toFixed(2)} €</td>
        <td>${Number(obs.marketSnapshot?.avg7 || 0).toFixed(2)} €</td>
        <td>${Number(obs.marketSnapshot?.avg1 || 0).toFixed(2)} €</td>
        <td>${isObservable(obs) ? "Oui" : "Non"}</td>
        <td>${obs.source || "-"}</td>
        <td><button onclick="deleteObservation('${obs.id}')">Supprimer</button></td>
      </tr>
    `;
  });
}

async function deleteObservation(id) {
  if (!confirm("Supprimer cette observation ?")) return;

  try {
    await api("POST", {
      type: "deleteObservation",
      id
    });
    log("Observation supprimée.");
    await loadData();
  } catch (e) {
    log("Erreur : " + e.message);
  }
}

loadSettings();
</script>
</body>
</html>
